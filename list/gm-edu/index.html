<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM EDU - Banco de Dados Real</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        :root {
            --bg-color: #0d1117; --card-bg: #161b22; --card-border: #30363d;
            --text-primary: #c9d1d9; --text-secondary: #8b949e; --accent-color: #58a6ff;
            --success-color: #2ea44f; --danger-color: #f85149;
        }
        body { background-color: var(--bg-color); color: var(--text-primary); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .edu-container { width: 100%; max-width: 900px; background-color: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 30px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); }
        header { border-bottom: 1px solid var(--card-border); padding-bottom: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.6rem; font-weight: 600; color: var(--accent-color); }
        .btn-back { background: transparent; border: 1px solid var(--card-border); color: var(--text-secondary); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .grid-subjects { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .subject-card { background: rgba(255, 255, 255, 0.01); border: 1px solid var(--card-border); border-radius: 8px; padding: 20px; }
        .subject-card h3 { margin-bottom: 14px; font-size: 1.15rem; border-bottom: 1px solid rgba(48, 54, 61, 0.5); padding-bottom: 6px; }
        .chapter-list { display: flex; flex-direction: column; gap: 8px; }
        .chapter-btn { background: var(--bg-color); border: 1px solid var(--card-border); color: var(--text-primary); padding: 10px 12px; border-radius: 6px; text-align: left; font-size: 0.85rem; cursor: pointer; width: 100%; display: flex; justify-content: space-between; }
        .chapter-btn:hover:not(:disabled) { border-color: var(--accent-color); color: var(--accent-color); }
        .chapter-btn:disabled { color: var(--text-secondary); opacity: 0.3; cursor: not-allowed; }
        .q-count { font-size: 0.75rem; color: var(--text-secondary); background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; }
        .quiz-area { display: none; }
        .question-box { font-size: 1.2rem; margin-bottom: 20px; line-height: 1.5; }
        .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .option-btn { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--card-border); color: var(--text-primary); padding: 14px 20px; border-radius: 8px; text-align: left; font-size: 1rem; cursor: pointer; width: 100%; }
        .option-btn:hover:not(:disabled) { border-color: var(--accent-color); }
        .option-btn.correct { background-color: rgba(46, 164, 79, 0.15) !important; border-color: var(--success-color) !important; color: #48c774; }
        .option-btn.wrong { background-color: rgba(248, 81, 73, 0.15) !important; border-color: var(--danger-color) !important; color: #ff6b6b; }
        .status-msg { text-align: center; color: var(--text-secondary); font-style: italic; padding: 40px; }
        .score-board { text-align: center; padding: 20px 0; }
        .score-board h2 { font-size: 2rem; color: var(--accent-color); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="edu-container">
        <header>
            <h1 id="appTitle">GM EDU</h1>
            <button class="btn-back" id="backBtn" style="display: none;" onclick="showSelectionScreen()">← Menu Principal</button>
        </header>

        <div id="selectionScreen">
            <div id="mainLoading" class="status-msg">Lendo arquivo do banco de dados local (opentdb_database.json)...</div>
            <div class="grid-subjects" id="subjectsContainer" style="display: none;"></div>
        </div>

        <div id="quizScreen" class="quiz-area">
            <div id="quizBody">
                <div class="question-box" id="questionText"></div>
                <div class="options-list" id="optionsContainer"></div>
            </div>
        </div>

        <div id="resultScreen" class="quiz-area score-board">
            <h2>Capítulo Concluído!</h2>
            <p id="scoreText" style="font-size: 1.2rem; margin-bottom: 20px;"></p>
            <button class="option-btn" style="text-align: center; max-width: 200px; margin: 0 auto;" onclick="showSelectionScreen()">Voltar</button>
        </div>
    </div>

    <script>
        const categoriasMap = {
            18: "🖥️ Computação e T.I",
            19: "📐 Matemática Avançada",
            17: "🔬 Ciências da Natureza",
            22: "🌍 Geografia Geral",
            23: "📜 História Geral",
            24: "🏛️ Política e Sociedade"
        };

        const niveisConfig = [
            { diff: "easy", label: "Cap. 1: Introdução (Fácil)" },
            { diff: "medium", label: "Cap. 2: Intermediário (Médio)" },
            { diff: "hard", label: "Cap. 3: Avançado (Difícil)" }
        ];

        let localDatabase = [];
        let currentQuestions = [];
        let currentQuestionIdx = 0;
        let score = 0;

        const selectionScreen = document.getElementById('selectionScreen');
        const subjectsContainer = document.getElementById('subjectsContainer');
        const mainLoading = document.getElementById('mainLoading');
        const quizScreen = document.getElementById('quizScreen');
        const resultScreen = document.getElementById('resultScreen');
        const backBtn = document.getElementById('backBtn');
        const appTitle = document.getElementById('appTitle');

        // Carrega rigorosamente o arquivo do repositório
        async function initDatabase() {
            try {
                const response = await fetch(`opentdb_database.json?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error();
                
                localDatabase = await response.json();
                mainLoading.style.display = 'none';
                subjectsContainer.style.display = 'grid';
                renderMenu();
            } catch (error) {
                mainLoading.innerHTML = `<span style="color: #ff6b6b;">Erro: Arquivo 'opentdb_database.json' não encontrado.<br>Aguarde o processamento do pipeline do GitHub Actions.</span>`;
            }
        }

        function renderMenu() {
            subjectsContainer.innerHTML = '';
            
            Object.keys(categoriasMap).forEach(catId => {
                const card = document.createElement('div');
                card.className = 'subject-card';
                
                let buttonsHtml = '';
                niveisConfig.forEach(nivel => {
                    const totalPerguntas = localDatabase.filter(q => {
                        if (q.difficulty !== nivel.diff) return false;
                        if (catId == 18) return q.category.includes('Computers');
                        if (catId == 19) return q.category.includes('Mathematics');
                        if (catId == 17) return q.category.includes('Science & Nature');
                        if (catId == 22) return q.category.includes('Geography');
                        if (catId == 23) return q.category.includes('History');
                        if (catId == 24) return q.category.includes('Politics');
                        return false;
                    }).length;

                    const isDisabled = totalPerguntas === 0 ? "disabled" : "";

                    buttonsHtml += `
                        <button class="chapter-btn" ${isDisabled} onclick="startQuiz('${catId}', '${nivel.diff}', '${categoriasMap[catId]} - ${nivel.diff.toUpperCase()}')">
                            <span>${nivel.label}</span>
                            <span class="q-count">${totalPerguntas} Q</span>
                        </button>
                    `;
                });

                card.innerHTML = `
                    <h3>${categoriasMap[catId]}</h3>
                    <div class="chapter-list">${buttonsHtml}</div>
                `;
                subjectsContainer.appendChild(card);
            });
        }

        function startQuiz(catId, difficulty, title) {
            selectionScreen.style.display = 'none';
            quizScreen.style.display = 'block';
            backBtn.style.display = 'block';
            appTitle.innerText = title;

            currentQuestions = localDatabase.filter(q => {
                if (q.difficulty !== difficulty) return false;
                if (catId == 18) return q.category.includes('Computers');
                if (catId == 19) return q.category.includes('Mathematics');
                if (catId == 17) return q.category.includes('Science & Nature');
                if (catId == 22) return q.category.includes('Geography');
                if (catId == 23) return q.category.includes('History');
                if (catId == 24) return q.category.includes('Politics');
                return false;
            });

            currentQuestionIdx = 0;
            score = 0;
            showQuestion();
        }

        function showQuestion() {
            const currentQuestion = currentQuestions[currentQuestionIdx];
            document.getElementById('questionText').innerHTML = `Questão ${currentQuestionIdx + 1} de ${currentQuestions.length}:<br><br>${currentQuestion.question}`;

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            const options = [...currentQuestion.incorrect_answers];
            const correctOption = currentQuestion.correct_answer;
            const insertIdx = Math.floor(Math.random() * (options.length + 1));
            options.splice(insertIdx, 0, correctOption);

            options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.innerHTML = option;
                button.onclick = () => checkAnswer(button, option, correctOption);
                optionsContainer.appendChild(button);
            });
        }

        function checkAnswer(selectedButton, selectedOption, correctOption) {
            const buttons = document.querySelectorAll('#optionsContainer .option-btn');
            buttons.forEach(btn => btn.disabled = true);

            if (selectedOption === correctOption) {
                selectedButton.classList.add('correct');
                score++;
            } else {
                selectedButton.classList.add('wrong');
                buttons.forEach(btn => { if (btn.innerHTML === correctOption) btn.classList.add('correct'); });
            }

            setTimeout(() => {
                currentQuestionIdx++;
                if (currentQuestionIdx < currentQuestions.length) {
                    showQuestion();
                } else {
                    showResults();
                }
            }, 1500);
        }

        function showResults() {
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'block';
            document.getElementById('scoreText').innerText = `Concluído: ${score} acertos de ${currentQuestions.length} questões.`;
        }

        function showSelectionScreen() {
            selectionScreen.style.display = 'block';
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'none';
            backBtn.style.display = 'none';
            appTitle.innerText = "GM EDU";
        }

        initDatabase();
    </script>
</body>
</html>
