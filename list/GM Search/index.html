<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Search</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151f32;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: var(--card-bg);
            padding: 6px 12px;
            border-radius: 50px;
            border: 1px solid #243552;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 1.1rem;
            padding: 10px;
        }

        .search-box button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-box button:hover {
            background: var(--accent-hover);
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            justify-content: center;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 8px 16px;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            font-weight: bold;
        }

        .results {
            margin-top: 30px;
        }

        .site-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid #1e2d4a;
        }

        .site-card a {
            color: #60a5fa;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 500;
        }

        .site-card a:hover {
            text-decoration: underline;
        }

        .site-card .url {
            color: #34d399;
            font-size: 0.85rem;
            margin: 4px 0 10px 0;
            word-break: break-all;
        }

        .site-card .snippet {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        .image-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #1e2d4a;
            transition: transform 0.2s;
        }

        .image-card:hover {
            transform: scale(1.03);
        }

        .image-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
        }

        .image-card .img-desc {
            padding: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>GM Search</h1>
        <div class="status" id="loadStatus">Carregando indexador...</div>
    </header>

    <div class="search-box">
        <input type="text" id="query" placeholder="O que você quer buscar hoje?" onkeyup="if(event.key === 'Enter') buscar()">
        <button onclick="buscar()">Buscar</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tabWeb" onclick="mudarAba('web')">🌐 Sites</button>
        <button class="tab-btn" id="tabImgs" onclick="mudarAba('imgs')">📷 Imagens</button>
    </div>

    <main class="results" id="output"></main>
</div>

<script>
    let bancoDados = { paginas: [], imagens: [] };
    let abaAtual = 'web';

    // Carrega o arquivo de indexação/cache gerado pelo robô Python
    fetch('index_cache.json')
        .then(res => res.json())
        .then(data => {
            bancoDados = data;
            document.getElementById('loadStatus').innerText = "Motor Pronto. Banco de dados local ativo!";
        })
        .catch(err => {
            document.getElementById('loadStatus').innerText = "Erro ao carregar banco de dados.";
            console.error(err);
        });

    function mudarAba(aba) {
        abaAtual = aba;
        document.getElementById('tabWeb').classList.toggle('active', aba === 'web');
        document.getElementById('tabImgs').classList.toggle('active', aba === 'imgs');
        buscar();
    }

    function buscar() {
        const query = document.getElementById('query').value.toLowerCase().trim();
        const container = document.getElementById('output');
        container.innerHTML = '';

        if (!query) return;

        if (abaAtual === 'web') {
            // Busca nos sites indexados
            const filtrados = bancoDados.paginas.filter(p => 
                p.titulo.toLowerCase().includes(query) || p.conteudo.toLowerCase().includes(query)
            );

            if (filtrados.length === 0) {
                container.innerHTML = '<p class="status">Nenhum resultado de site encontrado.</p>';
                return;
            }

            filtrados.forEach(p => {
                const card = document.createElement('div');
                card.className = 'site-card';
                card.innerHTML = `
                    <a href="${p.url}" target="_blank">${p.titulo}</a>
                    <div class="url">${p.url}</div>
                    <div class="snippet">${p.conteudo}</div>
                `;
                container.appendChild(card);
            });

        } else {
            // Busca nas imagens indexadas
            const filtradas = bancoDados.imagens.filter(i => 
                i.descricao.toLowerCase().includes(query)
            );

            if (filtradas.length === 0) {
                container.innerHTML = '<p class="status">Nenhuma imagem encontrada.</p>';
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'image-grid';

            filtradas.forEach(i => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.innerHTML = `
                    <a href="${i.url_origem}" target="_blank">
                        <img src="${i.url_imagem}" alt="${i.descricao}" onerror="this.src='https://placehold.co/300x200?text=Erro+Imagem'">
                    </a>
                    <div class="img-desc">${i.descricao}</div>
                `;
                grid.appendChild(card);
            });
            container.appendChild(grid);
        }
    }
</script>
</body>
</html>
