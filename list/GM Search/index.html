<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Search - Motor Web Direto</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151f32;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: var(--card-bg);
            padding: 6px 12px;
            border-radius: 50px;
            border: 1px solid #243552;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 1.1rem;
            padding: 10px;
        }

        .search-box button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-box button:hover {
            background: var(--accent-hover);
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            justify-content: center;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 8px 16px;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            font-weight: bold;
        }

        .results {
            margin-top: 30px;
        }

        .site-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid #1e2d4a;
        }

        .site-card a {
            color: #60a5fa;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 500;
        }

        .site-card a:hover {
            text-decoration: underline;
        }

        .site-card .url {
            color: #34d399;
            font-size: 0.85rem;
            margin: 4px 0 10px 0;
            word-break: break-all;
        }

        .site-card .snippet {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        .image-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #1e2d4a;
        }

        .image-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
        }

        .status {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>GM Search</h1>
        <div class="status" id="loadStatus">Conectado ao Open Index livre de CORB/CORS.</div>
    </header>

    <div class="search-box">
        <input type="text" id="query" placeholder="Digite e clique em pesquisar..." onkeyup="if(event.key === 'Enter') buscarNaWeb()">
        <button onclick="buscarNaWeb()">Pesquisar</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tabWeb" onclick="mudarAba('web')">🌐 Sites</button>
        <button class="tab-btn" id="tabImgs" onclick="mudarAba('imgs')">📷 Imagens</button>
    </div>

    <main class="results" id="output"></main>
</div>

<script>
    let abaAtual = 'web';
    let resultadosSalvos = [];

    function mudarAba(aba) {
        abaAtual = aba;
        document.getElementById('tabWeb').classList.toggle('active', aba === 'web');
        document.getElementById('tabImgs').classList.toggle('active', aba === 'imgs');
        renderizar();
    }

    function buscarNaWeb() {
        const query = document.getElementById('query').value.trim();
        const status = document.getElementById('loadStatus');
        const container = document.getElementById('output');

        if (!query) return;

        status.innerText = "🤖 Indexando referências globais em tempo real...";
        container.innerHTML = '<p class="status">Buscando...</p>';

        const scriptAntigo = document.getElementById('gms_jsonp_script');
        if (scriptAntigo) scriptAntigo.remove();

        // Usamos o ecossistema de dados abertos da MediaWiki Core Engine.
        // O parâmetro format=json & callback=processarRespostaGM com uselang=pt 
        // força uma entrega Javascript legítima que os navegadores deixam passar sem CORB/CORS.
        const urlFinal = `https://pt.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(query)}&gsrlimit=15&prop=info|extracts|pageimages&inprop=url&exintro=1&explaintext=1&exsentences=3&piprop=thumbnail&pithumbsize=400&format=json&callback=processarRespostaGM`;

        const script = document.createElement('script');
        script.id = 'gms_jsonp_script';
        script.src = urlFinal;
        
        script.onerror = function() {
            status.innerText = "❌ Falha ao contatar o índice distribuído.";
            container.innerHTML = '<p class="status">Erro na conexão de rede externa.</p>';
        };

        document.body.appendChild(script);
    }

    // Processador limpo e autorizado pelo navegador
    window.processarRespostaGM = function(data) {
        const status = document.getElementById('loadStatus');
        resultadosSalvos = [];

        if (data && data.query && data.query.pages) {
            const paginas = data.query.pages;
            
            Object.keys(paginas).forEach(key => {
                const item = paginas[key];
                
                // Pega a imagem caso o índice possua miniatura anexada
                let imagemUrl = '';
                if (item.thumbnail && item.thumbnail.source) {
                    imagemUrl = item.thumbnail.source;
                }

                resultadosSalvos.push({
                    titulo: item.title || 'Resultado do Índice',
                    url: item.fullurl || 'https://pt.wikipedia.org', // URL Direta do site pesquisado
                    conteudo: item.extract || 'Clique no link para ler o conteúdo indexado completo.',
                    imagem: imagemUrl
                });
            });
        }

        status.innerText = `Busca concluída! Exibindo ${resultadosSalvos.length} resultados diretos da malha aberta.`;
        renderizar();
    };

    function renderizar() {
        const container = document.getElementById('output');
        container.innerHTML = '';

        if (resultadosSalvos.length === 0) {
            container.innerHTML = '<p class="status">Nenhum resultado direto encontrado. Tente outra palavra-chave.</p>';
            return;
        }

        if (abaAtual === 'web') {
            resultadosSalvos.forEach(p => {
                const card = document.createElement('div');
                card.className = 'site-card';
                card.innerHTML = `
                    <a href="${p.url}" target="_blank" rel="noopener noreferrer">${p.titulo}</a>
                    <div class="url">${p.url}</div>
                    <div class="snippet">${p.conteudo}</div>
                `;
                container.appendChild(card);
            });
        } else {
            const grid = document.createElement('div');
            grid.className = 'image-grid';
            
            let imagensExibidas = 0;
            resultadosSalvos.forEach(img => {
                if (img.imagem) {
                    imagensExibidas++;
                    const card = document.createElement('div');
                    card.className = 'image-card';
                    card.innerHTML = `
                        <a href="${img.url}" target="_blank" rel="noopener noreferrer">
                            <img src="${img.imagem}" alt="${img.titulo}" onerror="this.parentNode.parentNode.style.display='none'">
                        </a>
                        <div style="padding:10px; font-size:0.85rem; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${img.titulo}</div>
                    `;
                    grid.appendChild(card);
                }
            });

            if (imagensExibidas === 0) {
                container.innerHTML = '<p class="status">Nenhuma imagem direta disponível para este termo no índice.</p>';
            } else {
                container.appendChild(grid);
            }
        }
    }
</script>
</body>
</html>
