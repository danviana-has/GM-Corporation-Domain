<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Search - Motor Web Direto</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151f32;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: var(--card-bg);
            padding: 6px 12px;
            border-radius: 50px;
            border: 1px solid #243552;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 1.1rem;
            padding: 10px;
        }

        .search-box button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-box button:hover {
            background: var(--accent-hover);
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            justify-content: center;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 8px 16px;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            font-weight: bold;
        }

        .results {
            margin-top: 30px;
        }

        .site-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid #1e2d4a;
        }

        .site-card a {
            color: #60a5fa;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 500;
        }

        .site-card a:hover {
            text-decoration: underline;
        }

        .site-card .url {
            color: #34d399;
            font-size: 0.85rem;
            margin: 4px 0 10px 0;
            word-break: break-all;
        }

        .site-card .snippet {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        .image-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #1e2d4a;
        }

        .image-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
        }

        .status {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>GM Search</h1>
        <div class="status" id="loadStatus">Conectado ao índice aberto direto no navegador.</div>
    </header>

    <div class="search-box">
        <input type="text" id="query" placeholder="Digite e clique em pesquisar..." onkeyup="if(event.key === 'Enter') buscarNaWeb()">
        <button onclick="buscarNaWeb()">Pesquisar</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tabWeb" onclick="mudarAba('web')">🌐 Sites</button>
        <button class="tab-btn" id="tabImgs" onclick="mudarAba('imgs')">📷 Imagens</button>
    </div>

    <main class="results" id="output"></main>
</div>

<script>
    let abaAtual = 'web';
    let resultadosSalvos = [];

    function mudarAba(aba) {
        abaAtual = aba;
        document.getElementById('tabWeb').classList.toggle('active', aba === 'web');
        document.getElementById('tabImgs').classList.toggle('active', aba === 'imgs');
        renderizar();
    }

    function buscarNaWeb() {
        const query = document.getElementById('query').value.trim();
        const status = document.getElementById('loadStatus');
        const container = document.getElementById('output');

        if (!query) return;

        status.innerText = "🤖 Vasculhando bilhões de páginas em tempo real...";
        container.innerHTML = '<p class="status">Buscando...</p>';

        // Para rodar direto do GitHub Pages sem API Key e sem limites de servidores centrais,
        // o motor consome a API livre do DuckDuckGo de sugestão enriquecida e respostas em formato aberto.
        const urlFinal = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&pretty=1&no_html=1&skip_disambig=1`;

        fetch(urlFinal)
            .then(res => res.json())
            .then(data => {
                resultadosSalvos = [];
                
                // 1. Extrai o tópico principal (Instant Answer) caso exista
                if (data.AbstractText) {
                    resultadosSalvos.push({
                        titulo: data.Heading || query,
                        url: data.AbstractURL,
                        conteudo: data.AbstractText,
                        imagem: data.Image
                    });
                }

                // 2. Transmuta os tópicos relacionados do índice aberto no formato do GM Search
                if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                    data.RelatedTopics.forEach(item => {
                        if (item.FirstURL && item.Text) {
                            // Limpa o texto separando o título da descrição do link
                            const partes = item.Text.split(' - ');
                            const titulo = partes[0] || 'Resultado da Web';
                            const resumo = partes[1] || item.Text;

                            resultadosSalvos.push({
                                titulo: titulo,
                                url: item.FirstURL,
                                conteudo: resumo,
                                imagem: item.Icon ? item.Icon.URL : ''
                            });
                        }
                    });
                }

                status.innerText = `Busca concluída sob demanda! Encontrados ${resultadosSalvos.length} blocos principais indexados.`;
                renderizar();
            })
            .catch(err => {
                status.innerText = "❌ Falha ao contatar a malha livre. Tente outro termo.";
                container.innerHTML = '<p class="status">Erro na busca local direta.</p>';
                console.error(err);
            });
    }

    function renderizar() {
        const container = document.getElementById('output');
        container.innerHTML = '';

        if (resultadosSalvos.length === 0) {
            container.innerHTML = '<p class="status">Nenhum resultado na memória. Digite um termo acima.</p>';
            return;
        }

        if (abaAtual === 'web') {
            resultadosSalvos.forEach(p => {
                const card = document.createElement('div');
                card.className = 'site-card';
                card.innerHTML = `
                    <a href="${p.url}" target="_blank">${p.titulo}</a>
                    <div class="url">${p.url}</div>
                    <div class="snippet">${p.conteudo}</div>
                `;
                container.appendChild(card);
            });
        } else {
            const grid = document.createElement('div');
            grid.className = 'image-grid';
            
            // Mapeia os metadados de imagem coletados na estrutura tradicional
            resultadosSalvos.forEach(img => {
                if (img.imagem) {
                    const urlCompletaImg = img.imagem.startsWith('http') ? img.imagem : `https://duckduckgo.com${img.imagem}`;
                    const card = document.createElement('div');
                    card.className = 'image-card';
                    card.innerHTML = `
                        <a href="${img.url}" target="_blank">
                            <img src="${urlCompletaImg}" alt="${img.titulo}" onerror="this.parentNode.parentNode.style.display='none'">
                        </a>
                        <div style="padding:10px; font-size:0.85rem; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${img.titulo}</div>
                    `;
                    grid.appendChild(card);
                }
            });

            if (grid.children.length === 0) {
                container.innerHTML = '<p class="status">Nenhuma imagem direta disponível para este termo no índice rápido.</p>';
            } else {
                container.appendChild(grid);
            }
        }
    }
</script>
</body>
</html>
