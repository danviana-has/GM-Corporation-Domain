<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Domains Product</title>
    <style>
        /* --- Reset e Variáveis de Cor --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --card-border: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-color: #58a6ff;
            --live-indicator: #2ea44f;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            width: 100%;
            max-width: 800px;
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(46, 164, 79, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(46, 164, 79, 0.2);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--live-indicator);
            border-radius: 50%;
            position: relative;
        }

        .pulse-dot::after {
            content: '';
            width: 100%;
            height: 100%;
            background-color: var(--live-indicator);
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            animation: pulse 1.8s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        .status-text {
            font-size: 0.75rem;
            color: #48c774;
            font-weight: 500;
            text-transform: uppercase;
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .loading-status {
            color: var(--text-secondary);
            font-style: italic;
            text-align: center;
            padding: 40px;
        }

        .project-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            padding: 16px 20px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .project-item:hover {
            border-color: var(--accent-color);
            background-color: rgba(88, 166, 255, 0.03);
            transform: translateY(-1px);
        }

        .project-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .folder-icon {
            width: 20px;
            height: 16px;
            background-color: #e3b341;
            border-radius: 2px;
            position: relative;
            display: inline-block;
        }

        .folder-icon::before {
            content: '';
            width: 8px;
            height: 4px;
            background-color: #e3b341;
            position: absolute;
            top: -3px;
            left: 0;
            border-radius: 2px 2px 0 0;
        }

        .project-name {
            font-weight: 500;
            color: var(--text-primary);
        }

        .project-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-left: 5px;
        }

        .btn-open {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: rgba(88, 166, 255, 0.1);
            color: var(--accent-color);
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn-open:hover {
            background-color: var(--accent-color);
            color: #ffffff;
        }
    </style>
</head>

<body>

    <main class="dashboard">
        <header>
            <h1>Todos os nossos domínios Web</h1>
            <div class="status-container" title="Backend Actions varrendo diretórios periodicamente">
                <div class="pulse-dot"></div>
                <div class="status-text">Actions Core Ativo</div>
            </div>
        </header>

        <div class="list" id="projectList">
            <div class="loading-status">Carregando domínios sincronizados...</div>
        </div>
    </main>

    <script>
        const container = document.getElementById('projectList');

        async function carregarProjetosEstaticos() {
            try {
                // Lê o arquivo gerado pelo Actions diretamente do seu repositório publicado
                // Ignora o cache do navegador para trazer sempre o JSON mais novo do deploy
                const response = await fetch(`list/projetos.json?t=${new Date().getTime()}`);
                
                if (!response.ok) {
                    container.innerHTML = '<div class="loading-status">O índice de domínios está sendo gerado pela primeira vez pelo Actions Backend...</div>';
                    return;
                }

                const projects = await response.json();

                if (projects.length === 0) {
                    container.innerHTML = '<div class="loading-status">Nenhum projeto com index.html ativo na pasta /list.</div>';
                    return;
                }

                container.innerHTML = ''; // Limpa o carregando

                projects.forEach(projeto => {
                    const item = document.createElement('div');
                    item.className = 'project-item';
                    
                    // Rota direta e limpa para o subdomínio da pasta
                    const projectUrl = `list/${projeto.nome}/index.html`;

                    item.innerHTML = `
                        <div class="project-info">
                            <span class="folder-icon"></span>
                            <div>
                                <span class="project-name">${projeto.nome}</span>
                                <span class="project-meta">/index.html operativo</span>
                            </div>
                        </div>
                        <a href="${projectUrl}" class="btn-open" target="_blank">
                            Acessar Domínio ↗
                        </a>
                    `;
                    container.appendChild(item);
                });

            } catch (error) {
                console.error("Erro ao ler banco de dados estático:", error);
                container.innerHTML = '<div class="loading-status" style="color: #ff6b6b;">Erro ao carregar mapa de domínios.</div>';
            }
        }

        // Executa imediatamente
        carregarProjetosEstaticos();

        // Verifica a cada 5 minutos
        setInterval(carregarProjetosEstaticos, 300000);
    </script>
</body>

</html>
