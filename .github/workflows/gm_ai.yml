name: GM AI Cloud Engine (Ollama)

on:
  push:
    paths:
      - 'list/gm-ai/chat.json'

permissions:
  contents: write

jobs:
  inference:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh

    - name: Start Ollama & Pull Qwen Coder
      run: |
        ollama serve &
        sleep 5
        ollama pull qwen2.5-coder:1.5b

    - name: Run Inference
      run: |
        python - <<EOF
        import json
        import subprocess

        chat_path = 'list/gm-ai/chat.json'
        
        with open(chat_path, 'r', encoding='utf-8') as f:
            data = json.load(f)
            
        last_message = data['messages'][-1]
        
        if last_message['role'] == 'user':
            prompt = last_message['content']
            print(f"Processando prompt na nuvem: {prompt}")
            
            result = subprocess.run(
                ['ollama', 'run', 'qwen2.5-coder:1.5b', prompt],
                capture_output=True,
                text=True,
                encoding='utf-8'
            )
            
            ai_text = result.stdout.strip() if result.returncode == 0 else "Erro interno no processamento do modelo."
            
            data['messages'].append({"role": "assistant", "content": ai_text})
            
            with open(chat_path, 'w', encoding='utf-8') as f:
                json.dump(data, f, indent=4, ensure_ascii=False)
        EOF

    - name: Commit and Push AI Response
      run: |
        git config --global user.name "GM AI Bot"
        git config --global user.email "actions@github.com"
        git add list/gm-ai/chat.json
        git commit -m "🤖 [GM AI] Resposta local gerada com sucesso"
        git push
