name: Executar GM Search Crawler

on:
  schedule:
    - cron: '0 0 * * *' # Roda automaticamente todo dia à meia-noite
  workflow_dispatch: # Permite que você ative o robô manualmente clicando em um botão no GitHub

jobs:
  build-and-crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dá permissão para salvar o cache json no repositório

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Python no servidor
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependências do robô
      run: |
        pip install requests beautifulsoup4

    - name: Executar o Robô Crawler e Indexador
      run: |
        python "list/GM Search/crawler.py"

    - name: Salvar o cache atualizado no repositório e publicar
      run: |
        git config --global user.name 'GM Search Bot'
        git config --global user.email 'bot@gmcorporation.com.br'
        git add "list/GM Search/index_cache.json"
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 [Bot] Cache do indexador atualizado em tempo real" && git push)
