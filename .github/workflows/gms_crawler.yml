name: Executar GM Search Crawler

on:
  workflow_dispatch:
    inputs:
      termo:
        description: 'Digite o termo para o motor SearXNG buscar na Web agora'
        required: true
        default: 'Tecnologia'

jobs:
  run-searxng-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Baixar o codigo do seu repositorio
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Baixar e Executar o Motor Pronto SearXNG (Docker)
      run: |
        # Inicia a imagem oficial e pronta do motor SearXNG em segundo plano
        docker run -d -d -p 8080:8080 --name motor_searxng \
          -e SEARXNG_SETTINGS="{'search': {'formats': ['json']}}" \
          searxng/searxng:latest
        
        # Aguarda 5 segundos para o motor carregar completamente na memória
        sleep 5

    - name: Consultar o Motor SearXNG via Terminal
      run: |
        # Transforma o termo digitado em texto seguro para URL
        QUERY=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${{ github.event.inputs.termo }}'))")
        
        # Faz a requisição direta para o motor SearXNG rodando no servidor
        # Ele busca tanto os sites (general) quanto as imagens
        curl -s "http://localhost:8080/search?q=${QUERY}&format=json" > bruto.json

    - name: Indexar e Formatar Resultados para o GM Search
      run: |
        # Script em linha para organizar o retorno do SearXNG no formato do seu index.html
        python3 -c "
        import json, os
        with open('bruto.json', 'r', encoding='utf-8') as f:
            dados = json.load(f)
        
        banco_cache = {
            'termo_atual': '${{ github.event.inputs.termo }}',
            'paginas': [],
            'imagens': []
        }
        
        # Filtra os sites retornados pelo motor
        for item in dados.get('results', [])[:15]:
            if 'url' in item and 'title' in item:
                if item.get('category') == 'images' or 'img_src' in item:
                    banco_cache['imagens'].append({
                        'url_imagem': item.get('img_src') or item.get('thumbnail'),
                        'url_origem': item.get('url'),
                        'descricao': item.get('title')
                    })
                else:
                    banco_cache['paginas'].append({
                        'titulo': item.get('title'),
                        'url': item.get('url'),
                        'conteudo': item.get('content', 'Sem resumo disponível.')
                    })
                    
        caminho = 'list/GM Search/index_cache.json'
        with open(caminho, 'w', encoding='utf-8') as f:
            json.dump(banco_cache, f, ensure_ascii=False, indent=2)
        "

    - name: Publicar Resultados Atualizados no Pages
      run: |
        git config --global user.name 'GM Backend Bot'
        git config --global user.email 'bot@gmcorporation.com.br'
        git checkout main
        git add "list/GM Search/index_cache.json"
        
        if ! git diff --quiet --cached; then
          git commit -m "⚙️ [GM Search] Resultados do SearXNG para '${{ github.event.inputs.termo }}' sincronizados"
          git pull --rebase origin main
          git push origin main
        else
          echo "Nenhum resultado novo detectado."
        fi
