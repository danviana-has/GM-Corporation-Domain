name: Executar GM Search Crawler

on:
  schedule:
    - cron: '0 0 * * *' # Executa de forma automática diariamente à meia-noite
  workflow_dispatch: # Mantém o botão manual ativo na aba Actions

jobs:
  build-and-crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão para o bot commitar o arquivo de volta

    steps:
    - name: Baixar o codigo do repositorio
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Traz o histórico completo para evitar rejeição de push

    - name: Configurar o Python no servidor
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias do robo
      run: |
        pip install requests beautifulsoup4

    - name: Executar o Robo Crawler e Indexador
      run: |
        python "list/GM Search/crawler.py"

    - name: Salvar Cache e Forçar Sincronizacao
      run: |
        git config --global user.name 'GM Backend Bot'
        git config --global user.email 'bot@gmcorporation.com.br'
        
        # Garante o alinhamento com a branch principal
        git checkout main
        
        # Aspas duplas protegem o espaço no nome da pasta 'GM Search'
        git add "list/GM Search/index_cache.json"
        
        # Verifica se o arquivo json teve alguma alteração gerada pelo crawler
        if ! git diff --quiet --cached; then
          git commit -m "⚙️ [GM OS] Banco de dados e domínios sincronizados via Actions"
          
          # Puxa modificações externas e aplica o arquivo gerado por cima delas
          git pull --rebase origin main
          
          # Envia os dados para o ar
          git push origin main
        else
          echo "Nenhuma alteração detectada no cache do GM Search. Pulando o push."
        fi
