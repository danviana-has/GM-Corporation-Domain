name: Executar GM Search Crawler

on:
  workflow_dispatch:
    inputs:
      termo:
        description: 'Digite o termo para o motor SearXNG buscar na Web agora'
        required: true
        default: 'Tecnologia'

jobs:
  run-searxng-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Baixar o codigo do seu repositorio
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Executar o Motor Pronto SearXNG
      run: |
        # Sobe o contêiner do motor original de forma limpa e sem chaves
        docker run -d -p 8080:8080 --name motor_searxng searxng/searxng:latest
        
        # Tempo para o servidor do motor iniciar as conexões
        sleep 12

    - name: Consultar o Motor SearXNG
      run: |
        # Codifica o termo de busca de forma direta
        QUERY=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${{ github.event.inputs.termo }}'))")
        
        # Faz a consulta direta no formato padrão do motor e salva o arquivo de texto
        curl -s "http://localhost:8080/search?q=${QUERY}&format=json" > bruto.json

    - name: Formatar Resultados para o GM Search
      run: |
        python3 -c "
        import json, os, sys
        
        if not os.path.exists('bruto.json') or os.path.getsize('bruto.json') == 0:
            sys.exit(1)
            
        with open('bruto.json', 'r', encoding='utf-8') as f:
            dados = json.load(f)
        
        banco_cache = {
            'termo_atual': '${{ github.event.inputs.termo }}',
            'paginas': [],
            'imagens': []
        }
        
        for item in dados.get('results', []):
            if 'url' in item and 'title' in item:
                if 'img_src' in item or 'thumbnail' in item or item.get('category') == 'images':
                    banco_cache['imagens'].append({
                        'url_imagem': item.get('img_src') or item.get('thumbnail'),
                        'url_origem': item.get('url'),
                        'descricao': item.get('title')
                    })
                else:
                    banco_cache['paginas'].append({
                        'titulo': item.get('title'),
                        'url': item.get('url'),
                        'conteudo': item.get('content', '')
                    })
                    
        with open('list/GM Search/index_cache.json', 'w', encoding='utf-8') as f:
            json.dump(banco_cache, f, ensure_ascii=False, indent=2)
        "

    - name: Publicar Resultados no Pages
      run: |
        git config --global user.name 'GM Backend Bot'
        git config --global user.email 'bot@gmcorporation.com.br'
        git checkout main
        git add "list/GM Search/index_cache.json"
        
        if ! git diff --quiet --cached; then
          git commit -m "⚙️ [GM Search] Resultados do SearXNG sincronizados"
          git pull --rebase origin main
          git push origin main
        fi
