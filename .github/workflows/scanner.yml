name: GM OS - Scanner de Domínios

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/5 * * * *' # Executa a cada 5 minutos exatos na nuvem do GitHub

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v4

    - name: Executar Varredura de Pastas
      run: |
        python - <<EOF
        import os
        import json

        base_dir = 'list'
        projetos = []

        # Verifica se a pasta existe
        if os.path.exists(base_dir):
            # Varre o diretório fisicamente
            for nome in os.listdir(base_dir):
                caminho_completo = os.path.join(base_dir, nome)
                # Verifica se é uma pasta e se contém o index.html
                if os.path.isdir(caminho_completo):
                    if os.path.exists(os.path.join(caminho_completo, 'index.html')):
                        projetos.append({"nome": nome})

        # Grava os dados em um arquivo estático limpo
        with open('list/projetos.json', 'w', encoding='utf-8') as f:
            json.dump(projetos, f, indent=4, ensure_ascii=False)
        
        print(f"Varredura concluída. {len(projetos)} domínios encontrados.")
        EOF

    - name: Commit e Push do Índice Atualizado
      run: |
        git config --global user.name "GM Scanner Bot"
        git config --global user.email "actions@github.com"
        # Verifica se o arquivo projetos.json mudou antes de commitar para evitar loops
        git add list/projetos.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "⚙️ [GM OS] Índice de domínios atualizado pelo backend" && git push)
