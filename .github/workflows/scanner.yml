name: GM OS - Scanner & Atualizador de Banco de Dados

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 1' # Atualiza o banco de dados de perguntas uma vez por semana automaticamente

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v4

    - name: Executar Varredura e Baixar Banco de Dados
      run: |
        python - <<EOF
        import os
        import json
        import requests
        import time

        # ---------------------------------------------------------
        # PARTE 1: VARREDURA DA PASTA 'LIST' (Seu painel de domínios)
        # ---------------------------------------------------------
        base_dir = 'list'
        projetos = []
        if os.path.exists(base_dir):
            for nome in os.listdir(base_dir):
                caminho_completo = os.path.join(base_dir, nome)
                if os.path.isdir(caminho_completo):
                    if os.path.exists(os.path.join(caminho_completo, 'index.html')):
                        projetos.append({"nome": nome})

        with open('list/projetos.json', 'w', encoding='utf-8') as f:
            json.dump(projetos, f, indent=4, ensure_ascii=False)


        # ---------------------------------------------------------
        # PARTE 2: DOWNLOAD DO DATASET COMPLETO DO OPENTDB
        # ---------------------------------------------------------
        print("Iniciando download do banco de dados OpenTDB...")
        categories = [17, 18, 19, 22, 23, 24] # Ciências, Computação, Matemática, Geografia, História, Política
        all_questions = []

        for cat in categories:
            print(f"Baixando categoria {cat}...")
            # Puxa o lote máximo permitido por vez pela API
            url = f"https://opentdb.com/api.php?amount=50&category={cat}&type=multiple"
            
            try:
                response = requests.get(url)
                data = response.json()
                if data.get('response_code') == 0:
                    all_questions.extend(data.get('results', []))
                # Pequena pausa regulatória para não tomar block durante o build
                time.sleep(2)
            except Exception as e:
                print(f"Aviso: Falha ao puxar lote para categoria {cat}: {e}")

        # Cria a pasta do gm-edu se ela não existir no container do Actions
        os.makedirs('list/gm-edu', exist_ok=True)

        # Salva o banco completo estático
        with open('list/gm-edu/opentdb_database.json', 'w', encoding='utf-8') as f:
            json.dump(all_questions, f, indent=4, ensure_ascii=False)

        print(f"Banco atualizado com sucesso! {len(all_questions)} perguntas salvas.")
        EOF

    - name: Commit e Push dos Dados Atualizados
      run: |
        git config --global user.name "GM Backend Bot"
        git config --global user.email "actions@github.com"
        git add list/projetos.json list/gm-edu/opentdb_database.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "⚙️ [GM OS] Banco de dados e domínios sincronizados via Actions" && git push)
